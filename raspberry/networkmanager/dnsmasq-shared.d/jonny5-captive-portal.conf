# JONNY5 captive portal for isolated hotspot clients (Quest / Android).
# Force hotspot DNS to resolve through the robot itself so HTTP connectivity
# probes land on the local captive portal even without upstream Internet.
address=/#/10.42.0.1

# Android 11+ CAPPORT hint (best effort). Clients that reject the local TLS
# certificate should still fall back to classic HTTP probe detection.
dhcp-option-force=114,https://10.42.0.1/captive-portal/api
