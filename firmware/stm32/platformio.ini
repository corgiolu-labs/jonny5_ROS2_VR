; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:nucleo_f446re]
platform = ststm32
board = nucleo_f446re
framework = zephyr
; Serial monitor: deve essere 115200 (come USART2 in zephyr/overlays/uart.overlay). Se vedi caratteri strani, verifica che il monitor usi 115200.
monitor_speed = 115200
board_build.zephyr.overlays = zephyr/overlays/uart.overlay zephyr/overlays/i2c.overlay zephyr/overlays/pwm.overlay zephyr/overlays/gpio_button.overlay zephyr/overlays/rt_timer.overlay
