CONFIG_SERIAL=y
CONFIG_UART_CONSOLE=y
CONFIG_UART_INTERRUPT_DRIVEN=y
CONFIG_STDOUT_CONSOLE=y
CONFIG_PRINTK=y
CONFIG_CONSOLE=y

CONFIG_LOG=y
# Deferred mode: log calls return instantly, flushed by idle thread.
# All printk on RT path converted to LOG_* so they never block the 1kHz loop.
CONFIG_LOG_MODE_DEFERRED=y
CONFIG_LOG_BUFFER_SIZE=2048
CONFIG_LOG_PROCESS_TRIGGER_THRESHOLD=10
CONFIG_LOG_DEFAULT_LEVEL=0
CONFIG_CBPRINTF_FP_SUPPORT=y

# Main thread stack — DO NOT REDUCE BELOW 2048.
# The main thread dispatches every UART command (uart_control_process in main.c).
# Worst-case handlers: VR? (char msg[320] + snprintf with 40 varargs under
# CBPRINTF_FP_SUPPORT) and SET_VR_PARAMS (16 float + 18 uint parse path).
# A prior reduction to 1536 left negligible headroom → intermittent silent
# stack overflow → kernel corruption → k_fatal_halt after some minutes in
# field (IMU sample_counter freezes, UART STATUS?/SAFE/IMUON timeouts,
# robot state degrades to UNKNOWN on Pi side). See NOTES.md.
CONFIG_MAIN_STACK_SIZE=2048
# RT loop thread stack (created explicitly in rt_loop.c with 4096)
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=2048
CONFIG_SYSTEM_WORKQUEUE_PRIORITY=5

CONFIG_CLOCK_CONTROL=y
CONFIG_GPIO=y
CONFIG_WATCHDOG=n

CONFIG_MULTITHREADING=y
CONFIG_SYS_CLOCK_TICKS_PER_SEC=1000
CONFIG_ASSERT=y
# Stack overflow detection — DO NOT DISABLE.
# Without sentinel canaries, any thread stack overflow silently corrupts
# adjacent kernel state and produces unpredictable failures minutes later
# (exactly the field pattern that preceded this fix). With sentinel on,
# an overflow produces a clean Zephyr fatal log on USART2 naming the
# offending thread, so future regressions are caught immediately instead
# of being hunted down through downstream symptoms. See NOTES.md.
CONFIG_STACK_SENTINEL=y
CONFIG_THREAD_STACK_INFO=y

# Driver SPI Zephyr OFF (usiamo HAL)
CONFIG_SPI=n

# SPI protocol: 128B canonical-compatible (64B semantico + 64B riservato)
CONFIG_ASSIST_V2_RAW_MODE=n
CONFIG_J5_CANONICAL_PADDED_128_MODE=y
CONFIG_TARGET_SPI_IDENTITY_MARKER=n

# PWM servo: TIM8 (50 Hz) + TIM1 (50 Hz)
CONFIG_PWM=y
CONFIG_PWM_STM32=y

# Counter driver per TIM6 = sorgente di tick hardware del RT loop a 1 kHz.
# Il tick RTOS (CONFIG_SYS_CLOCK_TICKS_PER_SEC=1000 -> 1 ms) e' troppo grossolano
# per un loop deterministico a 1 kHz: k_usleep() di una richiesta sub-tick viene
# arrotondato fino a ~2 tick -> ~512 Hz misurati. TIM6 genera invece un IRQ ogni
# 1000 us esatti (vedi zephyr/overlays/rt_timer.overlay) che sblocca il thread RT
# via semaforo, rendendo il periodo indipendente dalla granularita' dello scheduler.
CONFIG_COUNTER=y
CONFIG_COUNTER_TIMER_STM32=y

# I2C per IMU (interrupt-driven obbligatorio).
# Backend di produzione: BNO085 (SHTP su I2C, src/imu/bno085.c via i2c_read/write
# raw, nessun driver sensor Zephyr). CONFIG_SENSOR resta on per driver futuri.
CONFIG_I2C=y
CONFIG_I2C_STM32_INTERRUPT=y
CONFIG_SENSOR=y
