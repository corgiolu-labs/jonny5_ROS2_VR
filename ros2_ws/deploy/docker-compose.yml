# JONNY5 ROS2 control plane on the Pi (Raspberry Pi OS Trixie / Debian 13 host).
# Real hardware path. For a hardware-free smoke test use the mock override:
#   docker compose -f docker-compose.yml -f docker-compose.mock.yml up
services:
  jonny5:
    build:
      context: .
      dockerfile: Dockerfile
    image: jonny5-ros2:jazzy
    container_name: jonny5_ros2
    # Host network so DDS discovery and the VR WebSocket (8567) reach the LAN/headset.
    network_mode: host
    # Share the host /dev/shm so the SPI shim (spi_shm_bridge) and the legacy
    # ws_server on the host exchange telemetry/intent via shared_state files.
    ipc: host
    # SPI data plane to the STM32.
    devices:
      - "/dev/spidev0.0:/dev/spidev0.0"
    # Mount the repo root: ros2_ws (workspace) + raspberry (legacy codec reused by the driver).
    volumes:
      - "../../:/opt/jonny5"
    environment:
      - JONNY5_LEGACY_ROOT=/opt/jonny5/raspberry
      - ROS_DOMAIN_ID=0
      # SPI transport = proven deployment config (legacy jonny5-spi-j5vr.service).
      # The 128B canonical-window mode resolves the STM32 slave's stale/phased
      # telemetry (the driver scans the 128B window for the 'J5' offset). Without
      # it the native driver runs legacy_64 and cannot parse real frames.
      - J5_SPI_CANONICAL_128=1
      - J5_SPI_POST_XFER_DELAY_MS=0
    working_dir: /opt/jonny5/ros2_ws
    restart: unless-stopped
    command: ["ros2", "launch", "jonny5_bringup", "bringup.launch.py", "use_mock_spi:=false"]
