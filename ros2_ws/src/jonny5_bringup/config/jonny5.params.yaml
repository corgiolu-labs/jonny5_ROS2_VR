# JONNY5 ROS2 runtime parameters (native stack — see ADR-001).

jonny5_spi_driver:
  ros__parameters:
    # Dry-run default. Set use_mock_spi:=false on the real Raspberry Pi.
    use_mock_spi: true
    spi_device: "/dev/spidev0.0"
    spi_speed_hz: 1000000
    tx_rate_hz: 100.0
    # Rate of interleaved 0x03 STATUS requests to read the firmware diag
    # (deadman/armed/freeze/guard). 0 disables (telemetry-only).
    status_request_hz: 5.0
    # Path to the dir containing the legacy 'controller' package.
    # Empty = auto-resolve (env JONNY5_LEGACY_ROOT, repo walk-up, Pi fallback).
    legacy_root: ""
    joint_names:
      - base_joint
      - shoulder_joint
      - elbow_joint
      - wrist_yaw_joint
      - wrist_pitch_joint
      - wrist_roll_joint

jonny5_vr_bridge:
  ros__parameters:
    bind_host: "0.0.0.0"
    bind_port: 8567
