<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>JONNY5 Stereo XR (cam0=L, cam1=R)</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: #000;
      height: 100%;
      overflow: hidden;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      color: #fff;
    }
    #ui {
      position: fixed;
      inset: 0 auto auto 0;
      padding: 12px;
      display: flex;
      gap: 8px;
      align-items: center;
      z-index: 10;
      background: linear-gradient(180deg, rgba(0,0,0,.75), rgba(0,0,0,0));
      width: 100%;
      box-sizing: border-box;
    }
    button {
      appearance: none;
      border: 1px solid rgba(255,255,255,.25);
      background: rgba(255,255,255,.12);
      color: #fff;
      padding: 10px 12px;
      border-radius: 10px;
      font-weight: 600;
      cursor: pointer;
    }
    button:disabled { opacity: .5; cursor: not-allowed; }
    button.active, .btn.ghost.active {
      background: rgba(46, 204, 113, 0.25);
      color: #6ee7b7;
      border-color: rgba(46, 204, 113, 0.7);
    }
    #status {
      opacity: .85;
      font-size: 14px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    #ui {
      flex-wrap: nowrap;
      overflow-x: auto;
      overflow-y: hidden;
      scrollbar-width: none;
    }
    #ui::-webkit-scrollbar { display: none; }
    #canvas {
      width: 100vw;
      height: 100vh;
      display: block;
    }
    /* Fallback 2D preview */
    #preview {
      position: fixed;
      inset: 0;
      display: none;
      padding-top: 56px;
      box-sizing: border-box;
    }
    #previewInner {
      display: flex;
      gap: 8px;
      padding: 8px;
    }
    #previewInner video {
      width: 50%;
      background: #222;
    }

    /* --- HEAD MODE badge + overlay stop --- */
    #headModeBadge {
      position: fixed;
      top: 12px;
      left: 12px;
      z-index: 11;
      padding: 8px 14px;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: .3px;
      background: rgba(155, 89, 182, 0.85);
      border: 1px solid rgba(200,160,255,.5);
      color: #fff;
      display: none;
      user-select: none;
      pointer-events: none;
      animation: headPulse 1.8s ease-in-out infinite;
    }
    @keyframes headPulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.6; }
    }
    #btnStopHead {
      position: fixed;
      bottom: 18px;
      right: 18px;
      z-index: 12;
      padding: 12px 22px;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 700;
      background: rgba(231,76,60,0.9);
      border: 1.5px solid rgba(255,120,100,.6);
      color: #fff;
      cursor: pointer;
      display: none;
      box-shadow: 0 4px 16px rgba(0,0,0,.5);
    }
    #btnStopHead:hover { background: rgba(192,57,43,0.95); }

    /* --- FEEDBACK TELEOPPOSE (ACK) --- */
    #teleopPoseBadge {
      position: fixed;
      top: 12px;
      right: 12px;
      z-index: 11;
      padding: 8px 10px;
      border-radius: 10px;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: .2px;
      border: 1px solid rgba(255,255,255,.18);
      background: rgba(0,0,0,.35);
      color: rgba(255,255,255,.85);
      display: none;
      user-select: none;
      pointer-events: none;
    }
    #teleopPoseToast {
      position: fixed;
      top: 52px;
      right: 12px;
      z-index: 11;
      padding: 10px 12px;
      border-radius: 12px;
      font-size: 13px;
      font-weight: 700;
      background: rgba(16, 185, 129, .18); /* emerald */
      border: 1px solid rgba(16, 185, 129, .55);
      color: rgba(236, 253, 245, 1);
      opacity: 0;
      transform: translateY(-6px);
      transition: opacity 150ms ease, transform 150ms ease;
      pointer-events: none;
      display: none;
    }
    #teleopPoseToast.show {
      display: block;
      opacity: 1;
      transform: translateY(0);
    }

  </style>
</head>
<body>
  <!-- J5 VR viewer build 2026-03-08-debug -->
  <div id="debugOverlay" style="
   position: fixed; top: 0; left: 0; width: 100%;
   color: #00ff00; background: rgba(0,0,0,0.6); padding: 10px; font-size: 20px;
   z-index: 999999; display: none;
  "></div>
  <div id="videoDebugPanel" style="
   position: fixed; bottom: 8px; left: 8px;
   width: min(560px, calc(100vw - 16px)); box-sizing: border-box;
   color: #7dffaf; background: rgba(0,0,0,0.82); padding: 7px 9px; font-size: 11px; line-height: 1.35; font-family: monospace;
   z-index: 999998; max-height: 132px; overflow: auto; white-space: normal; word-break: break-word;
   border: 1px solid rgba(90,255,150,.42); border-radius: 10px;
   display: block;
  "></div>
  <div id="ui"></div>

  <div id="teleopPoseBadge">Pose VR: OK</div>
  <div id="teleopPoseToast">Teleop Pose applicata correttamente</div>

  <canvas id="canvas"></canvas>
  <!-- IMU/QUEST/Servo debug boxes removed — use dashboard for diagnostics -->

  <!-- Anteprima 2D: texture provengono dagli elementi WebRTC (WHEP); nessun MJPEG. -->
  <div id="preview">
    <div id="previewInner"></div>
  </div>
  <!-- Debug hard layer: preview visibile dei 2 HTMLVideoElement reali (pre-WebGL). -->
  <div id="videoPreviewDebug" style="
    position: fixed; right: 8px; bottom: 8px; z-index: 999997;
    display: flex; gap: 6px; background: rgba(0,0,0,0.75); padding: 6px; border: 1px solid #888;
  ">
    <video id="webrtcVidL" style="width:160px;height:120px;background:#111;object-fit:contain" playsinline autoplay muted></video>
    <video id="webrtcVidR" style="width:160px;height:120px;background:#111;object-fit:contain" playsinline autoplay muted></video>
  </div>

  <script src="../shared/js/j5_config.js"></script>
  <script src="../shared/js/vr_controls.js"></script>
  <script src="../shared/js/controller_remap.js"></script>
  <script>
    // Fallback se j5_config.js non carica (es. preview file:// senza server).
    // Garantisce che J5_CONFIG sia sempre definito prima del resto dello script.
    if (typeof J5_CONFIG === "undefined") {
      window.J5_CONFIG = {
        WS_PORT: 8557,
        HTTPS_PORT: 8443,
        WS_RECONNECT_BASE_MS: 400,
        WS_RECONNECT_MAX_MS: 3000,
        WS_RECONNECT_FACTOR: 1.5,
        EVENT_LOG_MAX_ENTRIES: 50,
        SLIDER_DEBOUNCE_MS: 50,
        FK_THROTTLE_HZ: 10,
        MOTION_PROFILES: ["RTR3", "RTR5", "BB", "BCB"],
        JOINT_NAMES: ["base", "spalla", "gomito", "yaw", "pitch", "roll"],
        JOINT_LABELS: ["Base", "Spalla", "Gomito", "Yaw", "Pitch", "Roll"],
      };
    }

    // =========================================================================
    // SECTION 1: NETWORK — Captive portal keepalive
    // =========================================================================
    // Captive portal keepalive — exported for XR session control
    function cpStartTouch() {}
    function cpStopTouch() {}

    // =========================================================================
    // SECTION 2: CONFIG — Host, URLs, constants
    // =========================================================================
    // Host dinamico: usa l'IP/hostname con cui la pagina Ã¨ stata caricata.
    // Funziona su qualsiasi rete (hotspot 10.42.0.1, LAN ICS 192.168.137.x, router, ecc.).
    const J5_HOST = window.location.hostname;
    // Use same origin (host:port) as the HTTPS page so the browser reuses the already-trusted
    // TLS certificate. The HTTPS server proxies /ws → local WS server on port 8557.
    const TELEOP_WS_URL = `wss://${window.location.host}/ws`;
    const HTTPS_ROOT = `https://${J5_HOST}:${J5_CONFIG.HTTPS_PORT}/`;
    const PORT_TELEOP = J5_CONFIG.WS_PORT;
    const DEBUG_IMU_UI = false;
    window.TELEOP_DEBUG_VERBOSE = false;
    const uiRoot = document.getElementById("ui");
    if (typeof window.createVRControls === "function") {
      window.createVRControls(uiRoot);
    }
    /* Fallback se lo script esterno non carica: stessi pulsanti del viewer (path assoluto + insert). */
    if (uiRoot && !uiRoot.querySelector("#btnStart")) {
      const wrap = document.createElement("div");
      wrap.className = "vr-controls-inline";
      wrap.innerHTML =
        '<button class="btn primary" id="btnStart">Start</button>' +
        '<button class="btn ghost" id="btnVR" disabled>Cam</button>' +
        '<button class="btn ghost" id="btnTeleopPose" disabled>Pose</button>' +
        '<button class="btn ghost" id="btnTeleop" disabled>Manual</button>' +
        '<button class="btn ghost" id="btnTeleopHead" disabled>Head</button>' +
        '<button class="btn ghost" id="btnTeleopHybrid" disabled>Hybrid</button>' +
        '<button class="btn ghost" id="btnTeleopIk" disabled>Assist</button>' +
        '<span id="vr-robot-state-badge">UNKNOWN</span>';
      uiRoot.insertBefore(wrap, uiRoot.firstChild);
    }
    if (uiRoot && !document.getElementById("status")) {
      const st = document.createElement("span");
      st.id = "status";
      uiRoot.appendChild(st);
    }

    const debugOverlayEl = document.getElementById("debugOverlay");

    // =========================================================================
    // SECTION 3: WEBSOCKET — Teleop WS connection, reconnect, message routing
    // =========================================================================
    function safeSend(ws, payload) {
      if (!ws || ws.readyState !== WebSocket.OPEN) return false;
      ws.send(JSON.stringify(payload));
      return true;
    }
    let teleopWs = null;
    let teleopHeartbeat = 0;
    let teleopStarted = false;
    let teleopWsUrl = null;
    let teleopReconnectT = null;
    let teleopBackoffMs = J5_CONFIG.WS_RECONNECT_BASE_MS;
    let teleopAttemptCount = 0;
    let imuEnabled = false;
    let inVRSession = false;
    // Timer per pubblicare session.frameRate dell'HMD ogni 2 s mentre la
    // sessione XR è attiva (vedi requestSession + addEventListener("end")).
    let _hmdRefreshTimer = null;
    // Buffer scorrevole di timestamp dei frame video ricevuti dal WHEP cam0
    // (webrtcVidL). Usato per stimare la latenza video lato HMD via
    // (inter-frame interval) * buffer_depth (4.5 per WebRTC, come dashboard).
    const _hmdVidIntervals = []; // ms, finestra scorrevole
    // Finestra 30 sample: ~250 ms a 120 fps, ~500 ms a 60 fps, 1 s a 30 fps.
    // Reattiva ai cambi di profilo video senza essere troppo rumorosa.
    const HMD_VID_WINDOW = 30;
    let _hmdVidLastT = null;
    let _hmdVidRvfcRegistered = false;
    const HMD_VID_BUFFER_DEPTH = 4.5;

    function enforceViewerHeadDefaults() {
      _sendUart("HEADSRC VISOR");
      _sendUart("VLEVEL OFF");
    }

    function _scheduleTeleopReconnect() {
      if (!teleopStarted) return;
      if (teleopReconnectT) return;
      const delay = teleopBackoffMs;
      teleopBackoffMs = Math.min(Math.trunc(teleopBackoffMs * J5_CONFIG.WS_RECONNECT_FACTOR), J5_CONFIG.WS_RECONNECT_MAX_MS);
      teleopReconnectT = setTimeout(() => {
        teleopReconnectT = null;
        openTeleopWebSocket();
      }, delay);
    }

    function openTeleopWebSocket() {
      // Non aprire WS se giÃ  aperto
      if (teleopWs && teleopWs.readyState === WebSocket.OPEN) {
        console.log("[WS] Teleop giÃ  aperto");
        return;
      }
      // Se sta giÃ  connettendo, lascia finire
      if (teleopWs && teleopWs.readyState === WebSocket.CONNECTING) {
        if (window.TELEOP_DEBUG_VERBOSE) console.log("[WS] Teleop connecting...");
        return;
      }

      teleopWsUrl = TELEOP_WS_URL;
      if (window.TELEOP_DEBUG_VERBOSE) console.log("[WS] teleop URL:", teleopWsUrl);
      console.log("[WS] Opening teleop WebSocket to", teleopWsUrl);

      try { teleopWs && teleopWs.close(); } catch (_) {}
      teleopWs = new WebSocket(teleopWsUrl);

      teleopWs.onopen = function () {
        console.log("[WS] Teleop WebSocket OPEN", teleopWsUrl);
        setStatus("VR attiva: TELEOP (WS connesso)");
        teleopBackoffMs = J5_CONFIG.WS_RECONNECT_BASE_MS;
        teleopAttemptCount = 0;
        enforceViewerHeadDefaults();
      };

      teleopWs.onclose = function (ev) {
        console.warn("[WS] Teleop WebSocket CLOSE", ev.code, ev.reason || "none");
        teleopWs = null;
        _scheduleTeleopReconnect();
      };

      teleopWs.onerror = function (err) {
        console.error("[WS] Teleop WebSocket ERROR", err);
        teleopAttemptCount++;
        _scheduleTeleopReconnect();
      };

      teleopWs.onmessage = function (ev) {
        // opzionale, se il server manda ack
        if (window.TELEOP_DEBUG_VERBOSE) console.log("[WS] Teleop message from server:", ev.data);
        try {
          const msg = JSON.parse(ev.data);
          if (msg && msg.teleop_pose_ack === true) {
            showTeleopPoseAck();
            /* Ripristina Manual VR (1) solo se HEAD mode NON Ã¨ in corso di attivazione.
             * Durante la sequenza _startHeadModeSequence l'ack viene intercettato
             * dal listener temporaneo nella Promise â€” qui non facciamo nulla. */
            if (!_headModeActive && !_headModeStarting) {
              teleopMode = 2;
              _syncModeButtons(2);
              setStatus("[TELEOP] Pose applicata â†’ ritorno Manual VR (2)");
            }
          }
          if (DEBUG_IMU_UI && msg && ("imu_valid" in msg || "imu_q_w" in msg)) {
            const w = typeof msg.imu_q_w === "number" ? msg.imu_q_w.toFixed(3) : "—";
            const x = typeof msg.imu_q_x === "number" ? msg.imu_q_x.toFixed(3) : "—";
            const y = typeof msg.imu_q_y === "number" ? msg.imu_q_y.toFixed(3) : "—";
            const z = typeof msg.imu_q_z === "number" ? msg.imu_q_z.toFixed(3) : "—";
            lastImuValues = { w, x, y, z };
            if (typeof updateImuTexture === "function") updateImuTexture();
          }
          if (msg && "imu_enabled" in msg) {
            imuEnabled = !!msg.imu_enabled;
          }
          if (msg && msg.robot_state !== undefined) {
            const badge = document.getElementById("vr-robot-state-badge");
            if (badge) {
              badge.textContent = msg.robot_state;
              const cls = { IDLE: "state-on", STOPPED: "state-off", SAFE: "state-warn" };
              badge.className = cls[msg.robot_state] || "";
            }
          }
          // Mappatura controller live-update via WS (broadcast dal backend dopo POST dashboard /controllers).
          if (msg && msg.type === "controller_mappings_updated" && window.controllerRemap) {
            try { window.controllerRemap.handleWsMessage(msg); } catch (_) {}
          }
          // Calibrazione stereo inviata dalla dashboard PC â†’ applica localmente e persiste in localStorage
          if (msg && msg.type === "vr_calib") {
            if (typeof msg.convPx    === "number") { convPx    = Math.trunc(msg.convPx);    localStorage.setItem("convPx",    String(convPx));    updateConvUI(); }
            // vertPx legacy: applica a entrambe le cam (retro-compat). vertPx0/1: per-cam.
            if (typeof msg.vertPx    === "number") { vertPx0 = vertPx1 = Math.trunc(msg.vertPx); updateVertUI(); }
            if (typeof msg.vertPx0   === "number") { vertPx0 = Math.trunc(msg.vertPx0); updateVertUI(); }
            if (typeof msg.vertPx1   === "number") { vertPx1 = Math.trunc(msg.vertPx1); updateVertUI(); }
            if (typeof msg.rollDeg0  === "number") { rollDeg0  = msg.rollDeg0;               localStorage.setItem("rollDeg0",  String(rollDeg0));  updateRollScaleUI(); }
            if (typeof msg.rollDeg1  === "number") { rollDeg1  = msg.rollDeg1;               localStorage.setItem("rollDeg1",  String(rollDeg1));  updateRollScaleUI(); }
            if (typeof msg.zoom0     === "number") { zoom0     = msg.zoom0;                  localStorage.setItem("zoom0",     String(zoom0));     updateRollScaleUI(); }
            if (typeof msg.zoom1     === "number") { zoom1     = msg.zoom1;                  localStorage.setItem("zoom1",     String(zoom1));     updateRollScaleUI(); }
            if (typeof msg.focusPos0 === "number") { setFocusPos(0, msg.focusPos0); }
            if (typeof msg.focusPos1 === "number") { setFocusPos(1, msg.focusPos1); }
            if (typeof updateHudTexture === "function") try { updateHudTexture(); } catch (_) {}
            console.log("[VR_CALIB] parametri aggiornati dalla dashboard:", msg);
          }
          // vr_zoom_command: comando di zoom inviato dalle dashboard (pulsanti +/-/reset).
          // Applica entrambi gli occhi simmetricamente usando changeZoom(); il delta o set
          // viene poi propagato via vr_zoom_state al backend (changeZoom lo emette gia').
          if (msg && msg.type === "vr_zoom_command") {
            try {
              const action = String(msg.action || "delta");
              const value = Number(msg.value);
              if (action === "reset") {
                changeZoom(0, 1.0 - zoom0);
                changeZoom(1, 1.0 - zoom1);
              } else if (action === "set" && Number.isFinite(value)) {
                changeZoom(0, value - zoom0);
                changeZoom(1, value - zoom1);
              } else if (Number.isFinite(value)) {
                // delta
                changeZoom(0, value);
                changeZoom(1, value);
              }
            } catch (_) {}
          }
        } catch (_) {}
      };
    }

    function startTeleopWs() {
      if (teleopStarted) return;
      teleopStarted = true;
      teleopBackoffMs = J5_CONFIG.WS_RECONNECT_BASE_MS;
      teleopAttemptCount = 0;
      openTeleopWebSocket();
    }

    function sendTeleopIntent(intent) {
      try {
        if (!teleopWs || teleopWs.readyState !== WebSocket.OPEN) {
          // Log quando il WebSocket non Ã¨ pronto (ogni 2 secondi per evitare spam)
          if (!sendTeleopIntent._lastWarn || (Date.now() - sendTeleopIntent._lastWarn) > 2000) {
            console.warn("[WS] Teleop non connesso, intent DROPPED. state=", teleopWs ? teleopWs.readyState : "null");
            if (window.TELEOP_DEBUG_VERBOSE) console.warn("[WS] teleop URL:", teleopWsUrl);
            setStatus("[TELEOP] WS non connesso â€” nessun comando inviato");
            sendTeleopIntent._lastWarn = Date.now();
          }
          return;
        }
        if (window.TELEOP_DEBUG_VERBOSE) console.log("[WS] intent SEND:", intent);
        safeSend(teleopWs, intent);
        // Log quando inviamo dati (ogni 100 invii = ~3 secondi a 30Hz)
        if (!sendTeleopIntent._sendCount) sendTeleopIntent._sendCount = 0;
        if (++sendTeleopIntent._sendCount % 100 === 0) {
          console.log("[teleop] Sent intent:", intent);
          console.log("[UI] mode:", intent.mode, "cmd:", intent.cmd ?? null);
        }
      } catch (e) {
        console.error("[teleop] Send error:", e);
        setStatus(`[TELEOP] Errore invio: ${e.message || e}`);
      }
    }

    // =========================================================================
    // SECTION 4: UI — Buttons, mode switching, HEAD/HYBRID/IK sequences
    // =========================================================================
    function showTeleopPoseAck() {
      const badge = document.getElementById("teleopPoseBadge");
      const toast = document.getElementById("teleopPoseToast");
      if (badge) {
        badge.style.display = "block";
        clearTimeout(showTeleopPoseAck._badgeT);
        showTeleopPoseAck._badgeT = setTimeout(() => { try { badge.style.display = "none"; } catch (_) {} }, 1200);
      }
      if (toast) {
        // reset animation
        toast.classList.remove("show");
        toast.style.display = "block";
        requestAnimationFrame(() => {
          toast.classList.add("show");
        });
        clearTimeout(showTeleopPoseAck._toastOutT);
        clearTimeout(showTeleopPoseAck._toastHideT);
        // fade-out 800ms su totale 1.2s
        showTeleopPoseAck._toastOutT = setTimeout(() => { try { toast.classList.remove("show"); } catch (_) {} }, 400);
        showTeleopPoseAck._toastHideT = setTimeout(() => { try { toast.style.display = "none"; } catch (_) {} }, 1200);
      }
    }

    const btnStart = document.getElementById("btnStart");
    const btnVR = document.getElementById("btnVR");
    const btnTeleop = document.getElementById("btnTeleop");
    const btnTeleopHead = document.getElementById("btnTeleopHead");
    const btnTeleopHybrid = document.getElementById("btnTeleopHybrid");
    const btnTeleopPose = document.getElementById("btnTeleopPose");
    const btnTeleopIk = document.getElementById("btnTeleopIk");

    // Stato teleop con tracking testa (HEAD/HYBRID).
    let _headModeActive = false;
    let _headModeStarting = false;

    function _setHeadModeUI(active) {
      _headModeActive = active;
    }

    /* Invia SAFE + ENABLE via UART e aspetta risposta (best-effort) */
    function _sendUart(cmd) {
      if (teleopWs && teleopWs.readyState === WebSocket.OPEN) {
        safeSend(teleopWs, { type: "uart", cmd });
      }
    }

    /*
     * Sequenza avvio HEAD mode:
     *  1. SAFE â†’ ENABLE  (porta firmware in STATE_IDLE)
     *  2. TELEOPPOSE      (robot va in VR pose â€” attende teleop_pose_ack)
     *  3. set_vr_mode=2   (avvia heartbeat HEAD sul backend, resetta calib IMU)
     *  4. enterVR("teleop") se non giÃ  in VR
     */
    async function _startHeadModeSequence(targetMode = 3) {
      if (_headModeStarting) return;
      // Consenti switch HEAD <-> HYBRID <-> altro senza restare bloccati su HEAD ASSIST (5).
      if (_headModeActive && teleopMode === targetMode) return;
      if (_headModeActive && teleopMode !== targetMode) {
        _stopHeadMode();
      }

      _headModeStarting = true;
      const isHybrid = targetMode === 4;
      const label = isHybrid ? "HYBRID" : "HEAD";

      setStatus("[" + label + "] Sequenza avvio: SAFE + ENABLE...");
      _sendUart("SAFE");
      await new Promise(r => setTimeout(r, 200));
      _sendUart("ENABLE");
      await new Promise(r => setTimeout(r, 200));

      if (isHybrid) {
        _sendUart("HYBRID ENABLE");
        await new Promise(r => setTimeout(r, 120));
      }
      enforceViewerHeadDefaults();

      setStatus("[" + label + "] Invio TELEOPPOSE — attendo conferma robot...");
      _sendUart("TELEOPPOSE");

      const ackOk = await new Promise(resolve => {
        const timeout = setTimeout(() => {
          teleopWs.removeEventListener("message", onAck);
          resolve(false);
        }, 5000);
        function onAck(ev) {
          try {
            const msg = JSON.parse(ev.data);
            if (msg && msg.teleop_pose_ack === true) {
              clearTimeout(timeout);
              teleopWs.removeEventListener("message", onAck);
              resolve(true);
            }
          } catch (_) {}
        }
        if (teleopWs) teleopWs.addEventListener("message", onAck);
        else { clearTimeout(timeout); resolve(false); }
      });

      if (!ackOk) {
        setStatus("[" + label + "] Nessun ACK VR pose (timeout 5s) — procedo comunque");
      } else {
        setStatus("[" + label + "] VR pose raggiunta — avvio modalità...");
      }

      if (teleopWs && teleopWs.readyState === WebSocket.OPEN) {
        teleopWs.send(JSON.stringify({ type: "set_vr_mode", mode: targetMode }));
      }
      teleopMode = targetMode;
      _syncModeButtons(targetMode);
      _setHeadModeUI(true);
      setStatus("[" + label + "] Tracking testa attivo — teleoperazione IMU in corso");

      if (!inVRSession) {
        try {
          await enterVR("teleop");
        } catch (e) {
          setStatus("[" + label + "] VR non avviabile: " + (e?.message || e));
        }
      } else {

    const locSampleShift = gl.getUniformLocation(prog, "uSampleShift");

    function makeVideoTexture() {

      gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, 1, 1, 0, gl.RGBA, gl.UNSIGNED_BYTE, new Uint8Array([0,0,0,255]));

    function _pickStickAxes(gp) {
      const axes = gp?.axes || [];
      if (!axes || axes.length < 2) return { axX: 0, axY: 0, pair: -1, axesLen: (axes?.length || 0) };
      const a0 = Number(axes[0] || 0), a1 = Number(axes[1] || 0);
      const pair01 = { axX: a0, axY: a1, pair: 0, axesLen: axes.length };
      if (axes.length < 4) return pair01;
      const a2 = Number(axes[2] || 0), a3 = Number(axes[3] || 0);
      const pair23 = { axX: a2, axY: a3, pair: 2, axesLen: axes.length };
      const mag01 = Math.abs(a0) + Math.abs(a1);
      const mag23 = Math.abs(a2) + Math.abs(a3);
      // Su Quest lo stick puÃ² essere solo su (2,3): se (0,1) Ã¨ zero preferisci (2,3)
      if (mag01 < 0.02 && mag23 >= 0.02) return pair23;
      if (mag23 < 0.02 && mag01 >= 0.02) return pair01;
      return mag23 > mag01 ? pair23 : pair01;
    }

    /**
     * Sticky (0,1) vs (2,3): dopo la prima scelta resta sulla coppia finché entrambe le magnitudini
     * sommate non tornano sotto REL (stick rilasciato). Solo teleop stick sinistro — evita flip per rumore.
     */
    function _pickStickAxesSticky(gp, sticky) {
      const axes = gp?.axes || [];
      if (!axes || axes.length < 2) {
        if (sticky) sticky.pair = -1;
        return { axX: 0, axY: 0, pair: -1, axesLen: (axes?.length || 0) };
      }
      const a0 = Number(axes[0] || 0), a1 = Number(axes[1] || 0);
      const pair01 = { axX: a0, axY: a1, pair: 0, axesLen: axes.length };
      if (axes.length < 4) {
        if (sticky) sticky.pair = -1;
        return pair01;
      }
      const a2 = Number(axes[2] || 0), a3 = Number(axes[3] || 0);
      const pair23 = { axX: a2, axY: a3, pair: 2, axesLen: axes.length };
      const mag01 = Math.abs(a0) + Math.abs(a1);
      const mag23 = Math.abs(a2) + Math.abs(a3);
      const REL = 0.02;
      if (mag01 < REL && mag23 < REL) {
        sticky.pair = -1;
        return pair01;
      }
      if (sticky.pair === -1) {
        let p;
        if (mag01 < REL && mag23 >= REL) p = 2;
        else if (mag23 < REL && mag01 >= REL) p = 0;
        else p = (mag23 > mag01) ? 2 : 0;
        sticky.pair = p;
        return p === 0 ? pair01 : pair23;
      }
      return sticky.pair === 0 ? pair01 : pair23;
    }

    /** Deadzone circolare [-1,1] sullo stick sinistro MANUAL (allineata ~ a joy_dz 0.10 lato firmware). */
    function _teleopLeftCircularDeadzone(x, y, radius) {
      const r = Math.hypot(x, y);
      if (r <= radius || r < 1e-8) return { x: 0, y: 0 };
      const outR = (r - radius) / (1.0 - radius);
      const s = outR / r;
      return { x: x * s, y: y * s };
    }

    function drawHud() {
      if (!hudCtx) return;

      // Canvas ridimensionato per aspect-ratio coerente con HUD_RECT_LATENCY.

        const txt = Number.isFinite(e2e) ? `latenza video: ${Math.round(e2e)}ms` : "latenza video: -- ms";
        hudCtx.fillStyle = "rgba(255,255,255,0.95)";

        `c=${convPx}`,

    function updateHudTexture() {

    const imuCtx = imuCanvas.getContext("2d");
    const texImu = makeVideoTexture();
    let lastImuValues = { w: "â€”", x: "â€”", y: "â€”", z: "â€”" };
    function updateImuTexture() {
      if (!imuCtx) return;
      const w = imuCanvas.width, h = imuCanvas.height;

    let _lastLogTexL = null, _lastLogTexR = null;
    function updateTexFromVideo(tex, imgEl) {
      // Usa TEXTURE0 per non interferire con HUD (TEXTURE1) e IMU (TEXTURE2).
      // Ottimizzazione: se l'elemento Ã¨ un <video> (es. WebRTC), upload diretto in texture
      // senza copia intermedia su canvas, per minor latenza di rendering.
      if (imgEl instanceof HTMLVideoElement && imgEl.readyState >= 1 && imgEl.videoWidth > 0) {
        const key = (tex === texL) ? "L" : "R";
        const now = Date.now();
        if (tex === texL) { videoDebugState.lastTexUpdateL = now; } else { videoDebugState.lastTexUpdateR = now; }
        const stateKey = key + imgEl.readyState + "x" + imgEl.videoWidth + "x" + imgEl.videoHeight;
        if ((key === "L" && _lastLogTexL !== stateKey) || (key === "R" && _lastLogTexR !== stateKey)) {
          console.log("[updateTexFromVideo] " + key + " video upload readyState=" + imgEl.readyState + " " + imgEl.videoWidth + "x" + imgEl.videoHeight);
          if (key === "L") _lastLogTexL = stateKey; else _lastLogTexR = stateKey;
        }
        gl.activeTexture(gl.TEXTURE0);
        gl.bindTexture(gl.TEXTURE_2D, tex);
        gl.pixelStorei(gl.UNPACK_FLIP_Y_WEBGL, true);
        try {
          gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, gl.RGBA, gl.UNSIGNED_BYTE, imgEl);
          if (inVRSession && key === "L" && !updateTexFromVideo._xrFirstOkL) {
            updateTexFromVideo._xrFirstOkL = true;
            console.log("[XR] first texImage2D success L", { w: imgEl.videoWidth, h: imgEl.videoHeight, readyState: imgEl.readyState });
          }
          if (inVRSession && key === "R" && !updateTexFromVideo._xrFirstOkR) {
            updateTexFromVideo._xrFirstOkR = true;
            console.log("[XR] first texImage2D success R", { w: imgEl.videoWidth, h: imgEl.videoHeight, readyState: imgEl.readyState });
          }
        } catch (e) {
          console.warn("[updateTexFromVideo] texImage2D error " + key + ":", e && e.message);
        }
        const glErr = gl.getError();
        if (glErr !== gl.NO_ERROR) {
          console.warn("[updateTexFromVideo] gl.getError after texImage2D", key, glErr);
        }
        return;
      }
      // Nessuna sorgente MJPEG: solo HTMLVideoElement WebRTC.
    }

    function resizeCanvasToDisplaySize() {
      const dpr = Math.max(1, Math.floor(window.devicePixelRatio || 1));
      const w = Math.floor(canvas.clientWidth * dpr);
      const h = Math.floor(canvas.clientHeight * dpr);
      if (canvas.width !== w || canvas.height !== h) {
        canvas.width = w; canvas.height = h;
      }
    }

    /** Disegna una singola view (usata in XR per occhio e in non-XR per metÃ  canvas). */
    function drawOneView(vpX, vpY, vpW, vpH, vid, tex, isRight) {
      gl.viewport(vpX, vpY, vpW, vpH);
      if (inVRSession && !drawOneView._xrLoggedOnce) {
        drawOneView._xrLoggedOnce = true;
        console.log("[XR] drawOneView first frame", {
          vpX, vpY, vpW, vpH, eye: isRight ? "R" : "L",
          source: vid instanceof HTMLVideoElement ? "video" : "canvas",
          tex: tex === texL ? "texL" : "texR",
        });
      }
      let vW = 0, vH = 0;
      if (vid instanceof HTMLVideoElement && vid.videoWidth > 0) {
        vW = vid.videoWidth;
        vH = vid.videoHeight;
      }
      let scaleX = 1.0, scaleY = 1.0, offX = 0.0, offY = 0.0;
      if (vW > 0 && vH > 0) {
        const videoAspect = vW / vH;
        const viewAspect = vpW / vpH;
        if (viewAspect > videoAspect) {
          scaleX = videoAspect / viewAspect;
          offX = (1.0 - scaleX) * 0.5;
        } else if (viewAspect < videoAspect) {
          scaleY = viewAspect / videoAspect;
          offY = (1.0 - scaleY) * 0.5;
        }
      }
      gl.uniform2f(locScale, scaleX, scaleY);
      gl.uniform2f(locOffset, offX, offY);
      let shiftUv = 0.0;
      if (vW > 0) shiftUv = convPx / vW;
      let shiftUvY = 0.0;
      // Shift verticale per-cam: cam0 (sx) usa vertPx0, cam1 (dx) usa vertPx1.
      const _vertForEye = isRight ? vertPx1 : vertPx0;
      if (vH > 0) shiftUvY = _vertForEye / vH;
      gl.uniform2f(locSampleShift, isRight ? -shiftUv : shiftUv, shiftUvY);
      const rollRad = (isRight ? rollDeg1 : rollDeg0) * Math.PI / 180.0;
      const zoom = isRight ? zoom1 : zoom0;
      gl.uniform1f(locRollRad, rollRad);
      gl.uniform1f(locZoom, zoom);
      gl.activeTexture(gl.TEXTURE0);
      gl.bindTexture(gl.TEXTURE_2D, tex);
      gl.drawArrays(gl.TRIANGLES, 0, 6);
      const glErr = gl.getError();
      if (glErr !== gl.NO_ERROR) {
        console.warn("[drawOneView] gl.getError after drawArrays", { eye: isRight ? "R" : "L", glErr, vpW, vpH, vW, vH });
      }
    }

    function uploadDiagTextures() {
      if (XR_DIAG_MODE === "solid") {
        gl.activeTexture(gl.TEXTURE0);
        gl.bindTexture(gl.TEXTURE_2D, texL);
        gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, 1, 1, 0, gl.RGBA, gl.UNSIGNED_BYTE, new Uint8Array([255, 0, 0, 255]));
        gl.bindTexture(gl.TEXTURE_2D, texR);

        if (!uploadDiagTextures._solidLogged) {

          console.log("[DIAG] solid mode active (L=red, R=green)");

        return true;

      if (XR_DIAG_MODE === "canvas") {

        diagCtxL.font = "48px monospace";

        diagCtxR.fillStyle = "#4f4";
        diagCtxR.font = "48px monospace";
        diagCtxR.fillText("RIGHT " + ts, 20, 120);
        gl.activeTexture(gl.TEXTURE0);
        gl.bindTexture(gl.TEXTURE_2D, texL);
        gl.pixelStorei(gl.UNPACK_FLIP_Y_WEBGL, true);

        gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, gl.RGBA, gl.UNSIGNED_BYTE, diagCanvasR);
        if (!uploadDiagTextures._canvasLogged) {
          uploadDiagTextures._canvasLogged = true;
          console.log("[DIAG] canvas mode active");

        return true;
      }
      return false;
    }

    /** Loop di rendering quando NON siamo in XR: aggiorna texture, pannello debug e disegna L/R side-by-side. */

      const w = canvas.width, h = canvas.height;
      const halfW = Math.floor(w / 2);
      drawOneView(0, 0, halfW, h, leftSourceEl, texL, false);

      if (btnVR) btnVR.disabled = false;

    async function enterVR(mode) {
      vrMode = mode || "stereo";
      if (!navigator.xr) {
        const httpsUrl = HTTPS_ROOT + "viewer_stereo_xr.html";
        setStatus("WebXR non disponibile qui: prova in HTTPS (" + httpsUrl + ")");
        preview.style.display = "block";
        return;
      }
      // Nota: immersive-vr richiede spesso HTTPS (secure context).
      disableButtonsDuringXR(); // disabilita solo finchÃ© la sessione XR Ã¨ attiva
      try {
        // DOM Overlay: permette <div> visibili in VR (Quest Browser lo supporta in secure context).
        const init = {
          requiredFeatures: [],
          optionalFeatures: ["dom-overlay"],
          domOverlay: { root: document.body },
        };
        try {
          xrSession = await navigator.xr.requestSession("immersive-vr", init);
        } catch (e) {
          // Fallback: se dom-overlay non Ã¨ supportato, riprova senza (non bloccare la VR).
          console.warn("[XR] requestSession(dom-overlay) fallita, retry senza overlay:", e);
          xrSession = await navigator.xr.requestSession("immersive-vr", { requiredFeatures: [] });
        }
      } catch (e) {
        // se la sessione non parte, ripristina subito la UI
        enableAllButtons();
        throw e;
      }
      inVRSession = true;
      videoDebugState.xrActive = true;
      // Stop captive portal keepalive during XR — WS is already connected
      cpStopTouch();
      // Su Quest il video puÃ² essere sospeso quando la pagina perde focus; riavvia play() all'ingresso in XR.

              if (!p || !p.axes || p.axes.length < 2) continue;
              const g1 = !!(p.buttons && p.buttons[1] && (p.buttons[1].pressed || (p.buttons[1].value || 0) > 0.5));
              const g2 = !!(p.buttons && p.buttons[2] && (p.buttons[2].pressed || (p.buttons[2].value || 0) > 0.5));
              if (i === 0) {
                const fb = _pickStickAxes(p);
                joy_x_raw = Number(fb.axX || 0);
                joy_y_raw = Number(fb.axY || 0);
                gripL = (g1 || g2) ? 1 : 0;
                buttonsLeftMask = _maskButtons16(p.buttons);
              } else {
                const { axX: rx, axY: ry } = _pickStickAxes(p);
                yaw_raw = Number(rx || 0);
                pitch_raw = Number(ry || 0);
                gripR = (g1 || g2) ? 1 : 0;
                buttonsRightMask = _maskButtons16(p.buttons);
              }
              usedXrGamepad = false;
            }
          }
        }

        // Quest fallback PULSANTI:
        // - se XR della mano è valido, mantieni autoritativi i bit X/Y (4/5)
        //   per evitare instabilità del ROLL dovuta a merge ambiguo.
        // - se XR non è valido, fallback completo da navigator.getGamepads().
        if (typeof navigator.getGamepads === "function") {
          const pads = navigator.getGamepads();
          if (pads) {
            if (pads[0] && pads[0].buttons) {
              const maskL = _maskButtons16(pads[0].buttons);
              buttonsLeftMask |= maskL;
              if (maskL & (1 << 1) || maskL & (1 << 2)) gripL = 1;
            }
            if (pads[1] && pads[1].buttons) {
              const maskR = _maskButtons16(pads[1].buttons);
              if (xrRightButtonsValid) {
                const ab = (1 << 4) | (1 << 5);
                buttonsRightMask = (buttonsRightMask & ab) | ((buttonsRightMask | maskR) & ~ab);
              } else {
                buttonsRightMask |= maskR;
              }
              if (maskR & (1 << 1) || maskR & (1 << 2)) gripR = 1;
            }
          }
        }

        // Normalizza scala ai16: -32768..+32767
        // In HYBRID (mode=4) base/spalla/gomito sono manuali su joy_x/joy_y.
        // Su alcuni Quest lo stick sinistro puÃ² risultare "muto" in XR:
        // fallback automatico allo stick destro per non perdere il controllo braccio.
        if (teleopMode === 4) {
          const joyMag = Math.abs(joy_x_raw) + Math.abs(joy_y_raw);
          if (joyMag < 0.05 && xrRightGp) {
            const { axX: fbX, axY: fbY } = _pickStickAxes(xrRightGp);
            joy_x_raw = Number(fbX || 0);
            joy_y_raw = Number(fbY || 0);
          }
        }

        const clamp11 = (v) => Math.max(-1, Math.min(1, Number(v || 0)));
        const toI16 = (v) => Math.max(-32768, Math.min(32767, Math.round(clamp11(v) * 32767)));
        const joy_x = toI16(joy_x_raw);
        const joy_y = toI16(joy_y_raw);
        const pitch = toI16(pitch_raw);
        const yaw = toI16(yaw_raw);

        // B) Y (controller SX, buttons[5]) in teleop -> dispatch via controllerRemap.
        // Append grip-modifier suffix per consentire alla dashboard di mappare
        // azioni differenti in base allo stato dei grip al momento della pressione.
        // Il dispatcher fa fallback automatico alla versione senza modifier se
        // non c'e' binding specifico per il contesto corrente.
        const bothGrips = !!(gripL && gripR);
        if (xrLeftGp?.buttons) {
          const yPressed = !!(xrLeftGp.buttons[5]?.pressed || (Number(xrLeftGp.buttons[5]?.value || 0) > 0.5));
          if (yPressed && !onXRFrame._yButtonPrev && window.controllerRemap) {
            try {
              const _modeName = window.controllerRemap.modeName(vrMode, teleopMode);
              let _gSfx = "";
              if (gripL && gripR)         _gSfx = "|bothGrips";
              else if (!gripL && !gripR)  _gSfx = "|noGrips";
              else if (gripL && !gripR)   _gSfx = "|leftGrip";
              else if (!gripL && gripR)   _gSfx = "|rightGrip";
              window.controllerRemap.dispatch(_modeName, "left.Y.press" + _gSfx);
            } catch (_) {}
          }
          onXRFrame._yButtonPrev = yPressed;
        } else {
          onXRFrame._yButtonPrev = false;
        }

        // C) Click thumbstick destro in teleop -> dispatch via controllerRemap.
        // Default config: autofocus in MANUAL/HEAD/HYBRID/ASSIST, escluso POSE.
        // Configurabile dalla dashboard /controllers.
        if (xrRightGp?.buttons && xrRightGp.buttons.length > 3 && window.controllerRemap) {
          const rThumbPressed = !!xrRightGp.buttons[3]?.pressed;
          if (rThumbPressed && !onXRFrame._rThumbPrevTeleop) {
            const _mn = window.controllerRemap.modeName(vrMode, teleopMode);
            window.controllerRemap.dispatch(_mn, "right.thumb.click");
          }
          onXRFrame._rThumbPrevTeleop = rThumbPressed;
        }

        // D) Stick DX asse X senza grip â†’ zoom entrambe le camere
        // Quando entrambi i grip sono rilasciati il robot Ã¨ fermo (no deadman):
        // l'asse X del controller destro, normalmente usato per yaw, viene
        // riutilizzato per regolare lo zoom di entrambe le camere contemporaneamente.
        if (!gripL && !gripR && xrRightGp) {
          const { axX: zoomAxX } = _pickStickAxes(xrRightGp);
          if (Math.abs(zoomAxX) > 0.25) {
            const zFactor = 5; // piÃ¹ rapido rispetto alla calibrazione
            changeZoom(0, zoomAxX > 0 ? zoomStep * zFactor : -zoomStep * zFactor);
            changeZoom(1, zoomAxX > 0 ? zoomStep * zFactor : -zoomStep * zFactor);
          }
        }

        // E) A/B controller DX held -> dispatch continuo via controllerRemap.
        // Modificatore "|bothGrips" appeso quando entrambi i grip sono premuti, cosi'
        // l'azione mappata cambia in funzione del contesto (default HYBRID + bothGrips:
        // A->zoom_in_continuous, B->zoom_out_continuous). Personalizzabile dashboard /controllers.
        if (xrRightGp && xrRightGp.buttons && window.controllerRemap) {
          const aHeld = !!(xrRightGp.buttons[4] && (xrRightGp.buttons[4].pressed || (Number(xrRightGp.buttons[4].value || 0) > 0.5)));
          const bHeld = !!(xrRightGp.buttons[5] && (xrRightGp.buttons[5].pressed || (Number(xrRightGp.buttons[5].value || 0) > 0.5)));
          if (aHeld !== bHeld) {
            const _modeName = window.controllerRemap.modeName(vrMode, teleopMode);
            const _suffix = bothGrips ? "|bothGrips" : "";
            if (aHeld) window.controllerRemap.dispatch(_modeName, "right.A.held" + _suffix);
            else       window.controllerRemap.dispatch(_modeName, "right.B.held" + _suffix);
          }
        }

        // F) Overlay latenza video (Hybrid/Head/Assist):
        // - rect riallineato ogni frame (gestisce anche cambio teleopMode mid-VR)
        // - texture HUD ridisegnata a ~4Hz (i dati WebRTC arrivano a ~1Hz)
        try { applyHudRect(); } catch (_) {}
        if (latencyOverlayVisible && _isLatencyOverlayActive()) {
          const nowL = performance.now();
          if (!onXRFrame._lastLatHud) onXRFrame._lastLatHud = 0;
          if (nowL - onXRFrame._lastLatHud > 250) {
            try { updateHudTexture(); } catch (_) {}
            onXRFrame._lastLatHud = nowL;
          }
        }

        // C) Logging avanzato per debug (attivo di default)
        if (window.TELEOP_DEBUG_VERBOSE) {
          try { console.log("[XR] XR gp used=", usedXrGamepad, "L=", xrLeftGp, "R=", xrRightGp); } catch (_) {}
          console.log("[XR] joy,pitch,yaw:", joy_x, joy_y, pitch, yaw);
          console.log("[XR] grip:", gripL, gripR);
        }

        const now = performance.now();
        if (!onXRFrame._lastTeleopSend) onXRFrame._lastTeleopSend = 0;
        /* HEAD/HYBRID restano veloci; HEAD ASSIST usa una cadenza piu' leggera
           per non saturare solver/backend al primo deadman. */
        const teleopIntervalMs = (teleopMode === 5) ? 40 : 16.67;
        if (now - onXRFrame._lastTeleopSend > teleopIntervalMs) {
          try {
            let grip = 0;
            let buttonsLeft = buttonsLeftMask | 0;
            let buttonsRight = buttonsRightMask | 0;
            
            // Leggi quaternioni orientamento visore
            let quatW = 1.0, quatX = 0.0, quatY = 0.0, quatZ = 0.0;
            if (pose && pose.transform && pose.transform.orientation) {
              const q = pose.transform.orientation;
              quatW = Number(q.w || 1.0);
              quatX = Number(q.x || 0.0);
              quatY = Number(q.y || 0.0);
              quatZ = Number(q.z || 0.0);
            }
            
            // Trigger destro (bit0): telemetria separata, non richiesto per il deadman.
            let trigR = false;
            try {
              if (xrRightGp?.buttons?.length > 0) {
                const b0 = xrRightGp.buttons[0];
                trigR = !!(b0 && (b0.pressed || (Number(b0.value || 0) > 0.85)));
              }
            } catch (_) {}
            // Deadman classico: doppio grip contemporaneo anche in HEAD ASSIST (5).
            grip = (gripL && gripR) ? 1 : 0;
            // Bitmask: garantisci grip su bit1 (coerente con firmware)
            if (gripL) buttonsLeft |= (1 << 1);
            if (gripR) buttonsRight |= (1 << 1);
            if (trigR) buttonsRight |= (1 << 0);

            // Trigger swap per MANUAL (2) e HYBRID (4): il firmware mappa
            // trigger_left -> BASE(-) e trigger_right -> BASE(+), ma l'operatore
            // vuole l'inverso (sx=ruota a sx, dx=ruota a dx). In ASSIST il solver
            // gestisce gia' la direzione corretta, quindi NON facciamo swap li'.
            if (teleopMode === 2 || teleopMode === 4) {
              const _tBitL = buttonsLeft  & (1 << 0);
              const _tBitR = buttonsRight & (1 << 0);
              buttonsLeft  = (buttonsLeft  & ~(1 << 0)) | _tBitR;
              buttonsRight = (buttonsRight & ~(1 << 0)) | _tBitL;
            }

            // Deadman: bit1 = grip (nessun overlay UI)
            const leftGrip  = (buttonsLeft  & (1 << 1)) !== 0;
            const rightGrip = (buttonsRight & (1 << 1)) !== 0;

            // JSON target: joy_x/joy_y/pitch/yaw come int16 ([-32768..32767]), intensity come uint8 [0..255]
            const clamp01 = (v) => Math.max(0, Math.min(1, v));
            const intensity01 = clamp01(Math.sqrt(_safeNum(joy_x_raw) * _safeNum(joy_x_raw) + _safeNum(joy_y_raw) * _safeNum(joy_y_raw)));
            const intensityU8 = Math.max(0, Math.min(255, Math.round(intensity01 * 255)));
            const nowSec = performance.now() / 1000;
            teleopHeartbeat = (teleopHeartbeat + 1) & 0xFFFF;
            
            // Log intent prima di inviare (ogni 100 invii)
            if (!onXRFrame._teleopIntentLog) onXRFrame._teleopIntentLog = 0;
            if (++onXRFrame._teleopIntentLog % 100 === 0) {
              const fmtQuat = (q) => q
                ? `[${q.w.toFixed(3)},${q.x.toFixed(3)},${q.y.toFixed(3)},${q.z.toFixed(3)}]`
                : "[n/a]";
              console.log(
                `[teleop] Intent: mode=${teleopMode} ` +
                `raw(L)=${joy_x_raw.toFixed(2)},${joy_y_raw.toFixed(2)} raw(R)=${pitch_raw.toFixed(2)},${yaw_raw.toFixed(2)} ` +
                `scaled joy=${joy_x},${joy_y} pitch=${pitch} yaw=${yaw} ` +
                `head=[${quatW.toFixed(3)},${quatX.toFixed(3)},${quatY.toFixed(3)},${quatZ.toFixed(3)}] ` +
                `ctrlL=${fmtQuat(leftControllerQuat)} ctrlR=${fmtQuat(rightControllerQuat)} ` +
                `buttons_L=0x${buttonsLeft.toString(16)} buttons_R=0x${buttonsRight.toString(16)}`
              );
            }
            
            // Invia sempre mode numerico (0,1,2,3,4) cosÃ¬ il firmware riceve 4->1 al "Riprendi"
            // e puÃ² riarmare; lo "idle" in Manual VR Ã¨ gestito lato STM32 (freeze dopo inattivitÃ ).
            const intent = {
              mode: teleopMode,
              joy_x,
              joy_y,
              pitch,
              yaw,
              quat_w: quatW,
              quat_x: quatX,
              quat_y: quatY,
              quat_z: quatZ,
              intensity: intensityU8,
              buttons_left: buttonsLeft,
              buttons_right: buttonsRight,
              grip: grip ? 1 : 0,
              heartbeat: teleopHeartbeat,
              timestamp: nowSec,
            };
            if (leftControllerQuat) {
              intent.ctrl_left_quat_w = leftControllerQuat.w;
              intent.ctrl_left_quat_x = leftControllerQuat.x;
              intent.ctrl_left_quat_y = leftControllerQuat.y;
              intent.ctrl_left_quat_z = leftControllerQuat.z;
            }
            if (rightControllerQuat) {
              intent.ctrl_right_quat_w = rightControllerQuat.w;
              intent.ctrl_right_quat_x = rightControllerQuat.x;
              intent.ctrl_right_quat_y = rightControllerQuat.y;
              intent.ctrl_right_quat_z = rightControllerQuat.z;
            }

            sendTeleopIntent(intent);
            /* box quaternioni visore non aggiornato: sempre nascosto */
          } catch (e) {
            console.error("[teleop] Error reading joystick:", e);
          }
          onXRFrame._lastTeleopSend = now;
        }
      }

      // In teleop (solo HEAD/HYBRID): overlay IMU in WebGL; in Manual VR non mostrare
      if (vrMode === "teleop") {
        /* IMU overlay removed — always hide rect */
        gl.uniform4f(locImuRect, 0.0, 0.0, 0.0, 0.0);
      } else {
        gl.uniform4f(locImuRect, 0.0, 0.0, 0.0, 0.0);
      }

      for (const view of pose.views) {
        const vp = glLayer.getViewport(view);
        const isRight = (view.eye === "right");
        const tex = isRight ? texR : texL;
        const vid = isRight ? rightSourceEl : leftSourceEl;
        drawOneView(vp.x, vp.y, vp.width, vp.height, vid, tex, isRight);
      }
      updateVideoDebugPanel();
    }

    // â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
    // UI flow
    // â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
    let started = false;
    // Fuoco separato: cam0 (sx) e cam1 (dx)
    let focusPos0 = Number(localStorage.getItem("focusPos0") || "1.0");
    let focusPos1 = Number(localStorage.getItem("focusPos1") || "1.0");

    // Offset fisso tra focus0 e focus1 (configurabile via file + localStorage)
    // Convenzione: focus1 = focus0 - focusOffset01
    let focusOffset01 = Number(localStorage.getItem("focusOffset01") || "0.25");
    // =========================================================================
    // SECTION 9: FOCUS & STARTUP — Autofocus, calibration load, boot sequence
    // =========================================================================
    async function loadCalibration() {
      try {
        const r = await fetch("/api/webrtc-calibration", { cache: "no-store" });
        if (!r.ok) return;
        const j = await r.json();
        const off = Number(j?.focusOffset01);
        if (Number.isFinite(off)) {
          focusOffset01 = off;
          localStorage.setItem("focusOffset01", String(focusOffset01));
          setStatus("Calib ok: focusOffset01=" + focusOffset01.toFixed(2));
        }
      } catch (_) {}
    }

    // ModalitÃ  LINK: focus/roll/zoom contemporanei (comandi dal controller destro)
    let linkMode = (localStorage.getItem("linkMode") === "1");
    function setLinkMode(v) {
      linkMode = !!v;
      localStorage.setItem("linkMode", linkMode ? "1" : "0");
      setStatus("LINK " + (linkMode ? "ON" : "OFF") + " (X su controller sx)");
      // aggiorna HUD subito
      try { if (onXRFrame._lastHud !== undefined) updateHudTexture(); } catch (_) {}
    }
    function toggleLinkMode() { setLinkMode(!linkMode); }
    // Ultimi target desiderati (buffer) â€” se il Control WS cade, li reinviamo al reconnect.
    let desiredFocus0 = focusPos0;
    let desiredFocus1 = focusPos1;
    let _focusSendTimer = null;
    let _lastSent0 = null;
    let _lastSent1 = null;

    // AF mode desiderato (quando premi A sul controller destro)
    let desiredAfMode = null; // "auto" | "continuous" | "manual" | null
    let _afSendTimer = null;
    let _lastSentAfMode = null;
    // Quando AF Ã¨ attivo, inibiamo il fuoco manuale via stick Y (evita cambi accidentali)
    let manualFocusEnabled = (localStorage.getItem("manualFocusEnabled") !== "0");
    const focusStep = 0.01;
    const focusMin = 0.0;
    const focusMax = 10.0;

    function _scheduleSendAf() {
      /* MediaMTX + WHEP: nessun signaling su :8556 — solo stato locale / HUD. */
      if (_afSendTimer) return;
      _afSendTimer = setTimeout(() => {
        _afSendTimer = null;
        if (!desiredAfMode) return;
        _lastSentAfMode = desiredAfMode;
        setStatus("AF (locale): " + desiredAfMode + " — non inviato al server (pipeline MediaMTX-only)");
      }, 120);
    }

    function setAutofocusBoth() {
      // â€œautofocusâ€ = continuo (segue la scena)
      desiredAfMode = "continuous";
      manualFocusEnabled = false;
      localStorage.setItem("manualFocusEnabled", "0");
      _scheduleSendAf();
    }

    function setManualFocusMode() {
      // Disattiva autofocus: passa a manuale (poi gli stick regolano f0/f1 separatamente)
      desiredAfMode = "manual";
      manualFocusEnabled = true;
      localStorage.setItem("manualFocusEnabled", "1");
      _scheduleSendAf();
      // assicura che i lensPos correnti siano (ri)spediti
      try { _lastSent0 = null; _lastSent1 = null; _scheduleSendFocus(); } catch (_) {}
    }

    function _scheduleSendFocus() {
      /* Nessun invio set_focus: la pipeline non espone più il WS di controllo signaling. */
      if (_focusSendTimer) return;
      _focusSendTimer = setTimeout(() => {
        _focusSendTimer = null;
        const v0 = Number(desiredFocus0.toFixed(2));
        const v1 = Number(desiredFocus1.toFixed(2));
        _lastSent0 = v0;
        _lastSent1 = v1;
      }, 140);
    }

    function setFocusPos(cam, v) {
      const vv = clamp(v, focusMin, focusMax);
      if (cam === 0) {
        focusPos0 = vv;
        localStorage.setItem("focusPos0", String(focusPos0));
        desiredFocus0 = vv;
      } else {
        focusPos1 = vv;
        localStorage.setItem("focusPos1", String(focusPos1));
        desiredFocus1 = vv;
      }
      _scheduleSendFocus();
      setStatus(`focus cam${cam}=` + vv.toFixed(2) + " (solo HUD locale; MediaMTX-only)");
      // Forza aggiornamento HUD immediato
      if (onXRFrame._lastHud !== undefined) {
        updateHudTexture();
      }
    }

    function setLinkedFocus0(vFocus0) {
      // In link-mode comandiamo entrambe: focus1 = focus0 - offset
      const v0 = clamp(vFocus0, focusMin, focusMax);
      const v1 = clamp(v0 - focusOffset01, focusMin, focusMax);
      focusPos0 = v0; focusPos1 = v1;
      desiredFocus0 = v0; desiredFocus1 = v1;
      localStorage.setItem("focusPos0", String(focusPos0));
      localStorage.setItem("focusPos1", String(focusPos1));
      _scheduleSendFocus();
      setStatus(`focus LINK f0=${v0.toFixed(2)} f1=${v1.toFixed(2)} (off=${focusOffset01.toFixed(2)})`);
      if (onXRFrame._lastHud !== undefined) updateHudTexture();
    }

    if (btnStart) btnStart.addEventListener("click", async () => {
      if (started) return;
      console.log("[Viewer] Start video button clicked");
      started = true;
      btnStart.disabled = true;
      setStatus("Connessione alle 2 camere (WHEP)â€¦");
      try {
        resetVideoLatencyTelemetry();
        await loadCalibration();
        startTeleopWs();
        let cfg = {};
        let res;
        try {
          res = await fetch("/api/video-config");
          try {
            cfg = await res.json();
          } catch (_) {
            cfg = {};
          }
        } catch (netErr) {
          console.error("[Viewer] /api/video-config network error:", netErr);
          throw new Error("Rete: impossibile leggere /api/video-config (" + (netErr && netErr.message ? netErr.message : netErr) + ")");
        }
        console.log("[Viewer] /api/video-config HTTP", res.status, cfg);
        if (!res.ok) {
          const detail = (cfg && cfg.error) ? cfg.error : ("HTTP " + res.status);
          throw new Error("Video config non disponibile: " + detail);
        }
        if (!cfg || cfg.video_pipeline !== "webrtc") {
          const detail = (cfg && cfg.error) ? cfg.error : "atteso video_pipeline: webrtc";
          throw new Error("Pipeline video non supportata: " + detail);
        }
        videoDebugState.pipeline = "webrtc";
        setStatus("WebRTC cam0/cam1 (WHEP)â€¦");
        console.log("[Viewer] connectWHEP(cam0) start");
        const { stream: streamL, pc: pcL } = await connectWHEP("cam0");
        webrtcPcL = pcL;
        console.log("[Viewer] connectWHEP(cam1) start");
        const { stream: streamR, pc: pcR } = await connectWHEP("cam1");
        webrtcPcR = pcR;
        console.log("[Viewer] webrtcVidL.srcObject assigned");
        webrtcVidL.srcObject = streamL;
        console.log("[Viewer] webrtcVidR.srcObject assigned");
        webrtcVidR.srcObject = streamR;
        if (_webrtcLatencyTimer) clearInterval(_webrtcLatencyTimer);
        _webrtcLatencyTimer = setInterval(pollWebRTCLatency, 1500);
        videoDebugState.cam0Connected = !!(streamL && streamL.getVideoTracks && streamL.getVideoTracks().length);
        videoDebugState.cam1Connected = !!(streamR && streamR.getVideoTracks && streamR.getVideoTracks().length);
        try {
          await Promise.all([webrtcVidL.play(), webrtcVidR.play()]);
          console.log("[Viewer] webrtcVidL.play() and webrtcVidR.play() resolved");
        } catch (playErr) {
          console.error("[Viewer] play() rejected:", playErr && playErr.name, playErr && playErr.message);
          setStatus("Video play() err: " + (playErr && playErr.message ? playErr.message : playErr));
        }
        leftSourceEl = webrtcVidL;
        rightSourceEl = webrtcVidR;
        console.log("[Viewer] leftSourceEl/rightSourceEl = webrtc video elements");
        await Promise.race([
          Promise.all([
            new Promise((resolve) => {
              const t0 = performance.now();
              (function waitL() {
                if ((webrtcVidL.videoWidth > 0 && webrtcVidL.currentTime > 0) || (performance.now() - t0) > 2500) return resolve();
                requestAnimationFrame(waitL);
              })();
            }),
            new Promise((resolve) => {
              const t0 = performance.now();
              (function waitR() {
                if ((webrtcVidR.videoWidth > 0 && webrtcVidR.currentTime > 0) || (performance.now() - t0) > 2500) return resolve();
                requestAnimationFrame(waitR);
              })();
            }),
          ]),
          new Promise((resolve) => setTimeout(resolve, 2600)),
        ]);
        console.log("[Viewer] post-play readiness", {
          l: { w: webrtcVidL.videoWidth, h: webrtcVidL.videoHeight, t: webrtcVidL.currentTime, rs: webrtcVidL.readyState, p: webrtcVidL.paused },
          r: { w: webrtcVidR.videoWidth, h: webrtcVidR.videoHeight, t: webrtcVidR.currentTime, rs: webrtcVidR.readyState, p: webrtcVidR.paused },
        });
        setStatus("WebRTC (WHEP) attivo. Entra in VR.");
        enableAllButtons();
        preview.style.display = "block";
      } catch (e) {
        console.error("[Viewer] Start video error:", e);
        setStatus("Errore connessione video: " + (e?.message || e));
        btnStart.disabled = false;
        started = false;
      }
    });

    function sendCalibrationIntentOnce() {
      if (!teleopWs || teleopWs.readyState !== 1) return;
      try {
        teleopHeartbeat = (teleopHeartbeat + 1) | 0;
        const intent = {
          mode: 0,
          joy_x: 0, joy_y: 0, pitch: 0, yaw: 0,
          quat_w: 1, quat_x: 0, quat_y: 0, quat_z: 0,
          intensity: 0, buttons_left: 0, buttons_right: 0,
          grip: 0, heartbeat: teleopHeartbeat,
        };
        teleopWs.send(JSON.stringify(intent));
        console.log("[UI] mode: 0 (calibration) sent once");
      } catch (_) {}
    }

    if (btnVR) btnVR.addEventListener("click", async () => {
      try {
        if (_headModeActive) _stopHeadMode();
        teleopMode = 0; // CALIBRATION_CAMERA
        _syncModeButtons(0);
        sendCalibrationIntentOnce();
        if (!inVRSession) {
          await enterVR("stereo");
        } else {
          vrMode = "stereo";
          setStatus("ModalitÃ  calibrazione camera (0) attiva");
        }
      } catch (e) {
        setStatus("VR non avviabile: " + (e?.message || e) + " (probabile: serve HTTPS)");
      }
    });

    if (btnTeleop) btnTeleop.addEventListener("click", async () => {
      try {
        if (_headModeActive) _stopHeadMode();
        teleopMode = 2; // MANUAL_VR
        _syncModeButtons(2);
        if (!inVRSession) {
          await enterVR("teleop");
        } else {
          vrMode = "teleop";
          setStatus("Manual VR (2) attiva");
        }
      } catch (e) {
        setStatus("VR non avviabile: " + (e?.message || e) + " (probabile: serve HTTPS)");
      }
    });

    if (btnTeleopHead) btnTeleopHead.addEventListener("click", async () => {
      // Toggle stop solo se siamo già in Head VR (3); da IK/Hybrid il click avvia HEAD.
      if (_headModeActive && teleopMode === 3) {
        _stopHeadMode();
        return;
      }
      try {
        await _startHeadModeSequence(3);
      } catch (e) {
        _headModeStarting = false;
        setStatus("[HEAD] Errore avvio: " + (e?.message || e));
        _setHeadModeUI(false);
      }
    });


    if (btnTeleopHybrid) btnTeleopHybrid.addEventListener("click", async () => {
      try {
        if (_headModeActive) _stopHeadMode();
        await _startHeadModeSequence(4);
      } catch (e) {
        _headModeStarting = false;
        setStatus("VR non avviabile: " + (e?.message || e) + " (probabile: serve HTTPS)");
      }
    });

    if (btnTeleopPose) btnTeleopPose.addEventListener("click", async () => {
      /* Invia TELEOPPOSE via UART (stesso canale WS, type="uart") â€” identico alla dashboard */
      if (teleopWs && teleopWs.readyState === WebSocket.OPEN) {
        teleopWs.send(JSON.stringify({ type: "uart", cmd: "TELEOPPOSE" }));
        setStatus("[TELEOP] Pose VR â†’ TELEOPPOSE via UART (modalitÃ  corrente invariata)");
      } else {
        setStatus("[TELEOP] Pose VR: WS non connesso, comando non inviato");
      }
      // Pose VR non cambia modalitÃ : se sei in HEAD/HYBRID resti lÃ¬.
      if (!inVRSession) {
        try {
          await enterVR("teleop");
        } catch (e) {
          setStatus("VR non avviabile per Pose: " + (e?.message || e));
        }
      } else {
        vrMode = "teleop";
      }
    });

    if (btnTeleopIk) btnTeleopIk.addEventListener("click", async () => {
      if (_headModeActive && teleopMode === 5) {
        _stopHeadMode();
        return;
      }
      try {
        await _startIkModeSequence();
      } catch (e) {
        _headModeStarting = false;
        setStatus("[HEAD ASSIST] Errore avvio: " + (e?.message || e));
      }
    });

    // Apertura da dashboard con ?mode=0|1|2|3|4: applica la modalitÃ  dopo breve delay (WS + DOM pronti)
    (function applyLaunchMode() {
      const params = new URLSearchParams(window.location.search);
      const modeParam = params.get("mode");
      if (modeParam === null) return;
      const m = parseInt(modeParam, 10);
      if (Number.isNaN(m) || m < 0 || m > 5) return;
      const btn = m === 0 ? btnVR : m === 1 ? btnTeleopPose : m === 2 ? btnTeleop : m === 3 ? btnTeleopHead : m === 4 ? btnTeleopHybrid : btnTeleopIk;
      if (!btn) return;
      setTimeout(function () {
        btn.click();
        try { window.history.replaceState({}, "", window.location.pathname); } catch (_) {}
      }, 1600);
    })();

    // canvas sizing per fallback (non XR): usa ResizeObserver invece di raf a 60Hz
    // cosÃ¬ il resize avviene solo quando il canvas cambia dimensione, non ad ogni frame.
    resizeCanvasToDisplaySize();
    if (typeof ResizeObserver !== "undefined") {
      new ResizeObserver(() => { if (!inVRSession) resizeCanvasToDisplaySize(); }).observe(canvas);
    } else {
      // Fallback per browser senza ResizeObserver
      window.addEventListener("resize", () => { if (!inVRSession) resizeCanvasToDisplaySize(); });
    }

    // ---- Controller remap: registra tutte le action note + carica config dal server.
    // Tutte le action devono essere gia' definite a questo punto (siamo a fine script).
    if (window.controllerRemap) {
      const cr = window.controllerRemap;
      cr.registerAction("noop", () => {});
      cr.registerAction("setAutofocusBoth",   setAutofocusBoth);
      cr.registerAction("setManualFocusMode", setManualFocusMode);
      cr.registerAction("toggleHudVisible",   toggleHudVisible);
      cr.registerAction("toggleLatencyOverlay", toggleLatencyOverlay);
      cr.registerAction("toggleLinkMode",     toggleLinkMode);
      // Continuous zoom: ogni call applica un singolo step (chiamato per-frame quando held).
      cr.registerAction("zoom_in_continuous",  () => { changeZoom(0,  zoomStep * 5); changeZoom(1,  zoomStep * 5); });
      cr.registerAction("zoom_out_continuous", () => { changeZoom(0, -zoomStep * 5); changeZoom(1, -zoomStep * 5); });
      // Crosshair: persistito in localStorage. Default ON.
      try {
        const _saved = localStorage.getItem("crosshairOn");
        window._crosshairOn = (_saved === null) ? true : (_saved === "1");
      } catch (_) { window._crosshairOn = true; }
      cr.registerAction("toggleCrosshair", () => {
        window._crosshairOn = !window._crosshairOn;
        try { localStorage.setItem("crosshairOn", window._crosshairOn ? "1" : "0"); } catch (_) {}
        try { setStatus("Mirino " + (window._crosshairOn ? "ON" : "OFF")); } catch (_) {}
      });
      // Hardware refocus: trigger restart MediaMTX (re-init libcamera AF su entrambe).
      // Causa ~1-2s di glitch video. Debounce client-side 5s + server-side 3s.
      // Auto-convergence on/off (misura disparita' L/R al centro -> convPx)
      try {
        const _saved = localStorage.getItem("autoConvEnabled");
        _autoConv.enabled = (_saved === "1");
      } catch (_) {}
      if (_autoConv.enabled) _ensureAutoConvLoop();
      cr.registerAction("toggleAutoConv", () => {
        _autoConv.enabled = !_autoConv.enabled;
        try { localStorage.setItem("autoConvEnabled", _autoConv.enabled ? "1" : "0"); } catch (_) {}
        if (_autoConv.enabled) _ensureAutoConvLoop();
        try { setStatus("Auto-convergence " + (_autoConv.enabled ? "ON" : "OFF")); } catch (_) {}
      });
      cr.registerAction("refocusCamerasHw", () => {
        const _now = performance.now();
        if (window._lastRefocusTs && (_now - window._lastRefocusTs) < 5000) {
          try { setStatus("Refocus in cooldown (5s)"); } catch (_) {}
          return;
        }
        window._lastRefocusTs = _now;
        try { setStatus("Refocus camere in corso..."); } catch (_) {}
        fetch("/api/refocus-cameras", { method: "POST" })
          .then(r => r.json().then(b => ({ ok: r.ok, body: b })))
          .then(({ ok, body }) => {
            try { setStatus(ok ? "Refocus OK" : ("Refocus errore: " + (body.error || "?"))); } catch (_) {}
            // Broadcast a tutti gli altri client (es. dashboard vr-live)
            // cosi' che riconnettano i propri stream WHEP dopo restart MediaMTX.
            if (ok) {
              try {
                if (teleopWs && teleopWs.readyState === WebSocket.OPEN) {
                  teleopWs.send(JSON.stringify({ type: "cameras_refocus_triggered" }));
                }
              } catch (_) {}
            }
          })
          .catch(e => { try { setStatus("Refocus errore: " + (e.message || e)); } catch (_) {} });
      });
      cr.loadFromServer();
    }
  </script>
</body>
